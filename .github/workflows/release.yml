name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AkademikAsistan.sln

      - name: Publish
        run: |
          dotnet publish AkademikAsistan.App/AkademikAsistan.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -o ./publish

      - name: Zip
        run: |
          Compress-Archive -Path "./publish/*" -DestinationPath "./AkademikAsistan-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Akademik Asistan ${{ github.ref_name }}"
          files: AkademikAsistan-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
